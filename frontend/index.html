<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Product Price Intelligence System</title>

    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(135deg, #1e3c72, #2a5298);
        min-height: 100vh;
        padding-top: 80px;
      }

      .navbar {
        position: fixed;
        top: 0;
        width: 100%;
        height: 60px;
        background: #1e3a8a;
        color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
        z-index: 1000;
      }

      .container {
        background: white;
        width: 950px;
        margin: auto;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      }

      input {
        padding: 12px;
        width: 350px;
        border-radius: 8px;
        border: 2px solid #ddd;
        font-size: 16px;
      }

      button {
        background: #2563eb;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        margin-left: 8px;
      }

      button:hover {
        background: #1e40af;
      }

      #results {
        margin-top: 25px;
        padding: 20px;
        border-radius: 15px;
        background: #f8fafc;
        min-height: 120px;
      }

      .card {
        display: flex;
        align-items: center;
        background: white;
        padding: 18px;
        border-radius: 15px;
        margin: 15px 0;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
      }

      .card img {
        width: 100px;
        height: 100px;
        border-radius: 12px;
        object-fit: cover;
        margin-right: 20px;
      }

      .best {
        background: #10b981;
        color: white;
        padding: 8px 12px;
        border-radius: 20px;
        font-weight: bold;
      }

      .history {
        margin-top: 40px;
      }
    </style>
  </head>

  <body>
    <!-- NAVBAR -->
    <div class="navbar">
      <div>🛒 Price Intelligence</div>
      <div>
        <span id="welcomeUser">Guest</span>
        <button onclick="goProfile()">Profile</button>
        <button style="background: #ef4444" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="container">
      <h2>🔍 Compare Product Prices</h2>

      <input
        type="text"
        id="searchKeyword"
        placeholder="Enter product (e.g., laptop)"
      />
      <button id="searchBtn">Compare Prices</button>
      <button onclick="refreshPrices()">🔄 Refresh</button>

      <!-- SINGLE RESULTS AREA (Search + Upload both) -->
      <div id="results">
        <center>Results will appear here...</center>
      </div>

      <br /><br />

      <input type="file" id="imageInput" accept="image/*" />
      <button onclick="uploadImage()">Upload Image & Compare</button>

      <div id="message"></div>

      <div class="history">
        <h3>📜 Upload History</h3>
        <div id="historyList"></div>
      </div>
    </div>

    <script>
      const API_URL = "http://127.0.0.1:8000";
      let lastKeyword = "";
      let isSearching = false;

      // PAGE LOAD
      document.addEventListener("DOMContentLoaded", () => {
        checkLogin();
        loadHistory();

        document
          .getElementById("searchBtn")
          .addEventListener("click", comparePrices);

        document
          .getElementById("searchKeyword")
          .addEventListener("keypress", (e) => {
            if (e.key === "Enter") comparePrices();
          });
      });

      // 🔍 MAIN SEARCH FUNCTION (FIXED - NO VANISH BUG)
      async function comparePrices() {
        if (isSearching) return;

        const keyword = document.getElementById("searchKeyword").value.trim();
        const resultsDiv = document.getElementById("results");

        if (!keyword) {
          resultsDiv.innerHTML = "❌ Enter a product name";
          return;
        }

        lastKeyword = keyword;
        isSearching = true;
        resultsDiv.innerHTML = `⏳ Searching "${keyword}" across stores...`;

        try {
          const res = await fetch(
            `${API_URL}/api/compare-prices?keyword=${encodeURIComponent(keyword)}`,
          );
          const data = await res.json();

          console.log("API RESPONSE:", data);

          if (!data || data.status !== "success" || !data.products?.length) {
            resultsDiv.innerHTML = "⚠️ No products found.";
            isSearching = false;
            return;
          }

          // SORT BY PRICE (BEST DEAL FIRST)
          const products = data.products.sort((a, b) => {
            const pa =
              parseFloat(String(a.price || 999999).replace(/[^\d.]/g, "")) ||
              999999;
            const pb =
              parseFloat(String(b.price || 999999).replace(/[^\d.]/g, "")) ||
              999999;
            return pa - pb;
          });

          let html = `<h3>🛒 ${products.length} Products Found</h3>`;

          products.forEach((p, i) => {
            html += `
        <div class="card">
          <img src="${p.image || "https://via.placeholder.com/100"}">
          <div style="flex:1;">
            <b>${p.title || "No Title"}</b><br>
            💰 Price: <b>${p.price || "N/A"}</b><br>
            🏪 Store: ${p.source || "Unknown"}<br>
            ${
              p.link
                ? `<a href="${p.link}" target="_blank">🔗 View Deal</a>`
                : "No link"
            }
          </div>
          ${i === 0 ? '<div class="best">🔥 BEST DEAL</div>' : ""}
        </div>
      `;
          });

          resultsDiv.innerHTML = html;
        } catch (error) {
          console.error(error);
          resultsDiv.innerHTML = "❌ Backend error. Check server.";
        }

        isSearching = false;
      }

      // 🔄 REFRESH BUTTON (Task 13 requirement)
      function refreshPrices() {
        if (lastKeyword) {
          comparePrices();
        } else {
          alert("Search a product first!");
        }
      }

      // 🖼 IMAGE UPLOAD + AUTO SEARCH
      async function uploadImage() {
        const fileInput = document.getElementById("imageInput");
        const message = document.getElementById("message");

        if (!fileInput.files.length) {
          message.innerHTML = "❌ Select an image first";
          return;
        }

        const formData = new FormData();
        formData.append("file", fileInput.files[0]);

        message.innerHTML = "⏳ Detecting product...";

        try {
          const res = await fetch(`${API_URL}/api/upload-image`, {
            method: "POST",
            body: formData,
          });

          const data = await res.json();

          if (data.status === "success") {
            message.innerHTML = `✅ Detected: ${data.detected_product}`;
            document.getElementById("searchKeyword").value =
              data.detected_product;
            comparePrices(); // AUTO SEARCH SAME RESULTS AREA
            loadHistory();
          } else {
            message.innerHTML = "❌ Detection failed";
          }
        } catch {
          message.innerHTML = "❌ Upload error";
        }
      }

      // 📜 LOAD HISTORY (DOES NOT TOUCH RESULTS - FIXED BUG)
      async function loadHistory() {
        try {
          const res = await fetch(`${API_URL}/api/history`);
          const history = await res.json();

          const list = document.getElementById("historyList");
          list.innerHTML = "";

          history.forEach((item) => {
            list.innerHTML += `
        <div class="card">
          <img src="${API_URL}/uploads/${item.filename}">
          <div>
            <b>${item.product}</b><br>
            Confidence: ${item.confidence?.toFixed(4)}
          </div>
        </div>
      `;
          });
        } catch (e) {
          console.log("History load error:", e);
        }
      }

      // 👤 LOGIN SYSTEM (FIXED)
      function checkLogin() {
        const user = localStorage.getItem("loggedUser") || "Guest";
        document.getElementById("welcomeUser").innerText = user;
      }

      function logout() {
        localStorage.removeItem("loggedUser");
        window.location.href = "login.html";
      }

      function goProfile() {
        window.location.href = "profile.html";
      }
    </script>
  </body>
</html>
