<!doctype html>
<html>
  <head>
    <title>Register - Product Intelligence</title>
    <style>
      body {
        margin: 0;
        font-family: Arial;
        background: linear-gradient(135deg, #0f2027, #2c5364);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .box {
        background: white;
        padding: 40px;
        border-radius: 15px;
        width: 350px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      input {
        width: 90%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background: #1d4ed8;
      }

      #message {
        margin-top: 15px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>📝 Register</h2>

      <input type="text" id="email" placeholder="Enter Email" />
      <input type="password" id="password" placeholder="Enter Password" />

      <button onclick="registerUser()">Register</button>

      <div id="message"></div>
    </div>

    <script>
      const API_URL = "http://127.0.0.1:8000";

      async function registerUser() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const msg = document.getElementById("message");

        if (!email || !password) {
          msg.style.color = "red";
          msg.innerHTML = "⚠️ Please enter email and password";
          return;
        }

        try {
          msg.style.color = "black";
          msg.innerHTML = "⏳ Registering...";

          const res = await fetch(`${API_URL}/api/register`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email: email,
              password: password,
            }),
          });

          const data = await res.json();
          console.log("Register Response:", data);

          if (res.ok) {
            msg.style.color = "green";
            msg.innerHTML =
              "✅ Registration Successful! Redirecting to Login...";

            // 🔥 GUARANTEED REDIRECT
            setTimeout(() => {
              window.location.replace("/frontend/login.html");
            }, 1200);
          } else {
            msg.style.color = "red";
            msg.innerHTML = data.detail || "❌ Registration failed";
          }
        } catch (error) {
          console.error(error);
          msg.style.color = "red";
          msg.innerHTML = "❌ Cannot connect to backend server!";
        }
      }
    </script>
  </body>
</html>
