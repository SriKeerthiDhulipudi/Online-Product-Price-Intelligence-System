<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Welcome - Product Price Intelligence</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        overflow: hidden;
      }

      .welcome-card {
        background: white;
        padding: 50px;
        border-radius: 20px;
        text-align: center;
        width: 500px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        animation: fadeIn 1.2s ease-in-out;
      }

      h1 {
        font-size: 32px;
        margin-bottom: 15px;
      }

      p {
        font-size: 18px;
        color: #555;
        margin-bottom: 30px;
      }

      .enter-btn {
        background: #2563eb;
        color: white;
        border: none;
        padding: 15px 35px;
        font-size: 18px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.3s;
      }

      .enter-btn:hover {
        background: #1e40af;
        transform: scale(1.05);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="welcome-card">
      <h1>🛒 Welcome Sri</h1>
      <h2>Product Price Intelligence System</h2>
      <p>
        AI-powered system to detect products from images and analyze pricing
        intelligently.
      </p>

      <button class="enter-btn" onclick="enterApp()">🚀 Enter System</button>
    </div>

    <script>
      function enterApp() {
        window.location.href = "index.html"; // redirect to upload page
      }
    </script>
  </body>
</html>
