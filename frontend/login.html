<!doctype html>
<html>
  <head>
    <title>Login - Product Intelligence</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f2027, #2c5364);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .login-box {
        background: white;
        padding: 40px;
        border-radius: 15px;
        width: 360px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      }

      h2 {
        margin-bottom: 20px;
      }

      input {
        width: 90%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 15px;
      }

      .btn {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
      }

      .login-btn {
        background: #2563eb;
        color: white;
      }

      .login-btn:hover {
        background: #1d4ed8;
      }

      .register-btn {
        background: #10b981;
        color: white;
      }

      .register-btn:hover {
        background: #059669;
      }

      #message {
        margin-top: 15px;
        font-weight: bold;
      }

      .register-link {
        margin-top: 15px;
        font-size: 14px;
      }

      .register-link a {
        color: #2563eb;
        text-decoration: none;
        font-weight: bold;
      }

      .register-link a:hover {
        text-decoration: underline;
      }
    </style>
  </head>

  <body>
    <div class="login-box">
      <h2>🔐 Login</h2>

      <!-- EMAIL -->
      <input type="text" id="email" placeholder="Enter Email" />

      <!-- PASSWORD -->
      <input type="password" id="password" placeholder="Enter Password" />

      <!-- LOGIN BUTTON -->
      <button class="btn login-btn" onclick="login()">Login</button>

      <!-- 🔥 REGISTER BUTTON (THIS WAS MISSING) -->
      <button class="btn register-btn" onclick="goToRegister()">
        Create New Account
      </button>

      <!-- MESSAGE -->
      <div id="message"></div>

      <!-- TEXT LINK -->
      <div class="register-link">
        Don't have an account?
        <a href="register.html">Register Here</a>
      </div>
    </div>

    <script>
      const API_URL = "http://127.0.0.1:8000";

      async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const msg = document.getElementById("message");

        if (!email || !password) {
          msg.style.color = "red";
          msg.innerHTML = "⚠️ Please enter email and password";
          return;
        }

        try {
          const res = await fetch(`${API_URL}/api/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email: email,
              password: password,
            }),
          });

          const data = await res.json();
          console.log("Login response:", data);

          if (res.status === 200) {
            localStorage.setItem("loggedUser", email);

            msg.style.color = "green";
            msg.innerHTML = "✅ Login Successful! Redirecting...";

            setTimeout(() => {
              window.location.href = "welcome.html";
            }, 1000);
          } else {
            msg.style.color = "red";
            msg.innerHTML = "❌ Invalid email or password";
          }
        } catch (error) {
          console.error(error);
          msg.style.color = "red";
          msg.innerHTML = "❌ Backend server not running!";
        }
      }

      function goToRegister() {
        window.location.href = "register.html";
      }
    </script>
  </body>
</html>
